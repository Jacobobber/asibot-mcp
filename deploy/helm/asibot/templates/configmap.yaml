apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "asibot.fullname" . }}
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
data:
  ASIBOT_TRANSPORT: {{ .Values.config.transport | quote }}
  ASIBOT_HOST: {{ .Values.config.host | quote }}
  ASIBOT_PORT: {{ .Values.config.port | quote }}
  ASIBOT_DASHBOARD_PORT: {{ .Values.config.dashboardPort | quote }}
  ASIBOT_DASHBOARD_ENABLED: {{ .Values.config.dashboardEnabled | quote }}
  ASIBOT_DATA_DIR: {{ .Values.config.dataDir | quote }}
  ASIBOT_ALLOW_INSECURE_HTTP: {{ .Values.config.allowInsecureHttp | quote }}
  ASIBOT_PG_POOL_MIN_SIZE: {{ .Values.config.pgPoolMinSize | quote }}
  ASIBOT_PG_POOL_MAX_SIZE: {{ .Values.config.pgPoolMaxSize | quote }}
  ASIBOT_SESSION_TTL: {{ .Values.config.sessionTtl | quote }}
  ASIBOT_ABSOLUTE_SESSION_TTL: {{ .Values.config.absoluteSessionTtl | quote }}
  ASIBOT_SESSION_CACHE_SIZE: {{ .Values.config.sessionCacheSize | quote }}
  ASIBOT_MAX_CONCURRENT_REQUESTS: {{ .Values.config.maxConcurrentRequests | quote }}
  ASIBOT_MAX_CONCURRENT_PER_USER: {{ .Values.config.maxConcurrentPerUser | quote }}
  ASIBOT_MAX_CONCURRENT_PER_SERVICE: {{ .Values.config.maxConcurrentPerService | quote }}
  ASIBOT_MAX_CONCURRENT_SETUPS: {{ .Values.config.maxConcurrentSetups | quote }}
  ASIBOT_POOL_MAX_CONNECTIONS: {{ .Values.config.poolMaxConnections | quote }}
  ASIBOT_POOL_MAX_CLIENTS: {{ .Values.config.poolMaxClients | quote }}
  ASIBOT_METRICS_ENABLED: {{ .Values.config.metricsEnabled | quote }}
  ASIBOT_METRICS_HOST: {{ .Values.config.metricsHost | quote }}
  ASIBOT_METRICS_PORT: {{ .Values.config.metricsPort | quote }}
  ASIBOT_AUDIT_RETENTION_DAYS: {{ .Values.config.auditRetentionDays | quote }}
  ASIBOT_GLOBAL_RATE_LIMIT_DEFAULT: {{ .Values.config.globalRateLimitDefault | quote }}
  ASIBOT_PER_USER_RATE_LIMIT_DEFAULT: {{ .Values.config.perUserRateLimitDefault | quote }}
{{- if .Values.pgbouncer.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "asibot.fullname" . }}-pgbouncer
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
data:
  pgbouncer.ini: |
    [databases]
    asibot = host={{ include "asibot.fullname" . }}-postgres port=5432 dbname=asibot

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    min_pool_size = {{ .Values.pgbouncer.minPoolSize }}
    reserve_pool_size = 10
    reserve_pool_timeout = 3
    server_lifetime = 3600
    server_idle_timeout = 600
    log_connections = 0
    log_disconnections = 0
    stats_period = 60
    admin_users = asibot
{{- end }}
