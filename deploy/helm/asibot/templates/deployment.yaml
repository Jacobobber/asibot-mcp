apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asibot.fullname" . }}
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "asibot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.config.metricsPort }}"
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "asibot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      {{- if gt (int .Values.antiAffinityWeight) 0 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.antiAffinityWeight }}
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - server
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: asibot
          image: {{ include "asibot.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
            - name: dashboard
              containerPort: {{ .Values.config.dashboardPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.config.metricsPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "asibot.fullname" . }}
            - secretRef:
                name: {{ include "asibot.secretName" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          volumeMounts:
            - name: asibot-data
              mountPath: {{ .Values.config.dataDir }}
      volumes:
        - name: asibot-data
          emptyDir: {}
{{- if .Values.postgresql.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "asibot.fullname" . }}-postgres
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    {{- include "asibot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "asibot.fullname" . }}-postgres
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "asibot.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "asibot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "asibot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: asibot
            - name: POSTGRES_USER
              value: asibot
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "asibot.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            {{- if .Values.postgresql.ha.enabled }}
            - name: REPLICATION_USER
              value: {{ .Values.postgresql.ha.replicationUser | quote }}
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "asibot.fullname" . }}-replication
                  key: REPLICATION_PASSWORD
            {{- end }}
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "asibot"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "asibot"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            {{- if .Values.postgresql.ha.enabled }}
            - name: postgres-ha-config
              mountPath: /etc/postgresql/extra
              readOnly: true
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/init-replication-user.sh
              subPath: init-replication-user.sh
              readOnly: true
            {{- end }}
      {{- if .Values.postgresql.ha.enabled }}
      volumes:
        - name: postgres-ha-config
          configMap:
            name: {{ include "asibot.fullname" . }}-postgres-ha
        - name: init-scripts
          configMap:
            name: {{ include "asibot.fullname" . }}-postgres-ha
            defaultMode: 0755
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgresql.storageClass }}
        storageClassName: {{ .Values.postgresql.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
{{- end }}
{{- if .Values.pgbouncer.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "asibot.fullname" . }}-pgbouncer
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  selector:
    {{- include "asibot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
  ports:
    - port: 6432
      targetPort: 6432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asibot.fullname" . }}-pgbouncer
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  replicas: {{ .Values.pgbouncer.replicas }}
  selector:
    matchLabels:
      {{- include "asibot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgbouncer
  template:
    metadata:
      labels:
        {{- include "asibot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: {{ .Values.pgbouncer.image }}
          ports:
            - containerPort: 6432
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            - name: pgbouncer-userlist
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
              readOnly: true
      volumes:
        - name: pgbouncer-config
          configMap:
            name: {{ include "asibot.fullname" . }}-pgbouncer
        - name: pgbouncer-userlist
          secret:
            secretName: {{ include "asibot.fullname" . }}-pgbouncer-userlist
{{- end }}
