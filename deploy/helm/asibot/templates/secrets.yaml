{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "asibot.fullname" . }}
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  ASIBOT_DATABASE_URL: {{ include "asibot.databaseUrl" . | quote }}
  {{- if .Values.secrets.ms365TenantId }}
  ASIBOT_MS365_TENANT_ID: {{ .Values.secrets.ms365TenantId | quote }}
  {{- end }}
  {{- if .Values.secrets.ms365ClientId }}
  ASIBOT_MS365_CLIENT_ID: {{ .Values.secrets.ms365ClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.githubClientId }}
  ASIBOT_GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.googleClientId }}
  ASIBOT_GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.googleClientSecret }}
  ASIBOT_GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.metricsBearerToken }}
  ASIBOT_METRICS_BEARER_TOKEN: {{ .Values.secrets.metricsBearerToken | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.pgbouncer.enabled (not .Values.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "asibot.fullname" . }}-pgbouncer-userlist
  labels:
    {{- include "asibot.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
type: Opaque
stringData:
  userlist.txt: |
    "asibot" "{{ .Values.secrets.postgresPassword }}"
{{- end }}
