# Asibot Helm chart values

# -- Number of Asibot server replicas
replicaCount: 3

image:
  # -- Container image repository
  repository: asibot
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to Chart appVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the release name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Asibot server configuration (non-secret, injected as ConfigMap)
config:
  transport: "streamable-http"
  host: "0.0.0.0"
  port: 8080
  dashboardPort: 8081
  dashboardEnabled: true
  dataDir: "/data"
  allowInsecureHttp: true  # TLS terminated at Ingress
  pgPoolMinSize: 10
  pgPoolMaxSize: 100
  sessionTtl: 3600
  absoluteSessionTtl: 28800
  sessionCacheSize: 1000
  maxConcurrentRequests: 2000
  maxConcurrentPerUser: 10
  maxConcurrentPerService: 200
  maxConcurrentSetups: 100
  poolMaxConnections: 20
  poolMaxClients: 200
  metricsEnabled: true
  metricsHost: "0.0.0.0"
  metricsPort: 9090
  auditRetentionDays: 365
  globalRateLimitDefault: 200
  perUserRateLimitDefault: 30

# -- Secrets (provide via --set or external-secrets in production)
secrets:
  # -- PostgreSQL password (REQUIRED)
  postgresPassword: ""
  # -- Full database URL (auto-generated if empty, using postgresPassword)
  databaseUrl: ""
  # -- Microsoft 365 tenant ID
  ms365TenantId: ""
  # -- Microsoft 365 client ID
  ms365ClientId: ""
  # -- GitHub OAuth client ID
  githubClientId: ""
  # -- Google OAuth client ID
  googleClientId: ""
  # -- Google OAuth client secret
  googleClientSecret: ""
  # -- Metrics endpoint bearer token
  metricsBearerToken: ""

# -- Use an existing secret instead of creating one
existingSecret: ""

# -- Pod resource requests and limits
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP port
  port: 8080
  # -- Dashboard port
  dashboardPort: 8081
  # -- Metrics port
  metricsPort: 9090

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: nginx
  # -- Ingress annotations
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
  # -- Ingress hosts
  hosts:
    - host: asibot.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration
  tls:
    - secretName: asibot-tls
      hosts:
        - asibot.example.com

autoscaling:
  # -- Enable HorizontalPodAutoscaler
  enabled: true
  # -- Minimum replicas
  minReplicas: 3
  # -- Maximum replicas
  maxReplicas: 10
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 70
  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: 80
  # -- Scale-down stabilization window (seconds)
  scaleDownStabilizationSeconds: 300

# -- Pod anti-affinity weight (0 to disable)
antiAffinityWeight: 100

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Additional pod annotations
podAnnotations: {}

# -- Additional pod labels
podLabels: {}

# -- Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# -- PodDisruptionBudget: prevents Kubernetes from evicting too many pods
# during voluntary disruptions (node drains, upgrades, etc.).
# With minAvailable: 2 and replicaCount >= 3, at least 2 pods always remain
# available during rolling updates and node maintenance.
podDisruptionBudget:
  # -- Enable PodDisruptionBudget for the Asibot server deployment
  enabled: true
  # -- Minimum number of pods that must remain available during disruptions
  minAvailable: 2

# -- PostgreSQL settings (bundled single-instance for dev/test)
#
# IMPORTANT: For production deployments serving 1000+ employees, we strongly
# recommend using a managed PostgreSQL service instead of this bundled instance:
#   - AWS:   Amazon RDS for PostgreSQL or Aurora PostgreSQL
#   - GCP:   Cloud SQL for PostgreSQL
#   - Azure: Azure Database for PostgreSQL - Flexible Server
# Managed services provide automated failover, backups, monitoring, and
# patching with significantly less operational burden than self-managed HA.
#
# Set postgresql.enabled=false and provide a DATABASE_URL via secrets.databaseUrl
# when using a managed service.
postgresql:
  # -- Deploy bundled PostgreSQL StatefulSet
  enabled: true
  image: postgres:16-alpine
  storage: 20Gi
  # -- Storage class (empty = cluster default)
  storageClass: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # -- High Availability: PostgreSQL streaming replication
  #
  # Enables read replicas via PostgreSQL native streaming replication.
  # The primary remains the single-writer; replicas serve read-only queries.
  #
  # WARNING: Self-managed PostgreSQL HA requires careful operational procedures
  # for failover, monitoring, and backup. For 1000+ employee production
  # deployments, a managed PostgreSQL service (see above) is the preferred
  # approach. Enable this only if managed services are not available.
  ha:
    # -- Enable PostgreSQL HA (streaming replication with read replicas)
    enabled: false
    # -- Number of read replicas
    replicas: 2
    # -- PostgreSQL replication user name
    replicationUser: "replicator"
    # -- PostgreSQL replication user password (REQUIRED if ha.enabled=true;
    #    provide via --set postgresql.ha.replicationPassword=<secret>)
    replicationPassword: ""
    # -- Maximum acceptable replication lag in bytes before replica is
    #    considered unhealthy. Default 10MB (10485760 bytes).
    #
    #    Monitor replication lag on the primary with:
    #      SELECT client_addr,
    #             state,
    #             pg_wal_lsn_diff(pg_current_wal_lsn(), sent_lsn) AS send_lag_bytes,
    #             pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn) AS replay_lag_bytes
    #      FROM pg_stat_replication;
    #
    #    Or expose it as a Prometheus metric using postgres_exporter:
    #      pg_stat_replication_pg_wal_lsn_diff (gauge)
    #
    #    Alert when replay_lag_bytes exceeds maxLagBytes for sustained periods.
    maxLagBytes: 10485760


# -- Alertmanager: routes Prometheus alerts to PagerDuty/Slack/webhooks
#
# Enable this to deploy Alertmanager alongside Prometheus. Without it,
# Prometheus alert rules fire but notifications go nowhere.
alertmanager:
  # -- Deploy Alertmanager
  enabled: false
  image: prom/alertmanager:latest
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # -- Webhook URL for alert notifications (used for all severity levels
  #    unless PagerDuty/Slack is configured below)
  webhookUrl: ""
  # -- PagerDuty service key for SEV1 critical alerts
  #    (takes priority over webhookUrl for SEV1)
  pagerdutyServiceKey: ""
  # -- Slack webhook URL for SEV1 critical alerts
  #    (used if pagerdutyServiceKey is empty)
  slackWebhookUrl: ""
  # -- Slack channel for critical alerts
  slackChannel: "#asibot-critical"

# -- PgBouncer settings
pgbouncer:
  # -- Deploy bundled PgBouncer
  enabled: true
  replicas: 2
  image: edoburu/pgbouncer:latest
  maxClientConn: 1000
  defaultPoolSize: 50
  minPoolSize: 10
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
