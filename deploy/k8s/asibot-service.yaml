apiVersion: v1
kind: Service
metadata:
  name: asibot
  namespace: asibot
  labels:
    app.kubernetes.io/name: asibot
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: asibot
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: dashboard
      port: 8081
      targetPort: dashboard
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
