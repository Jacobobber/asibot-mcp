apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asibot
  namespace: asibot
  labels:
    app.kubernetes.io/name: asibot
    app.kubernetes.io/component: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asibot
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Uncomment if you have a Prometheus adapter exposing custom metrics:
    # - type: Pods
    #   pods:
    #     metric:
    #       name: asibot_active_sessions
    #     target:
    #       type: AverageValue
    #       averageValue: "200"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
