apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asibot
  namespace: asibot
  labels:
    app.kubernetes.io/name: asibot
    app.kubernetes.io/component: server
  annotations:
    # Nginx ingress controller annotations (adjust for your controller)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Enable WebSocket/SSE support for streamable-http transport
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - asibot.example.com
      secretName: asibot-tls
  rules:
    - host: asibot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: asibot
                port:
                  number: 8080
