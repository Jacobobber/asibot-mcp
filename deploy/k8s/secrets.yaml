# TEMPLATE: Replace placeholder values before applying.
# In production, use sealed-secrets, external-secrets-operator, or Vault.
#
# To generate base64 values:
#   echo -n 'your-value' | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: asibot-secrets
  namespace: asibot
  labels:
    app.kubernetes.io/name: asibot
    app.kubernetes.io/component: server
type: Opaque
data:
  # REQUIRED: PostgreSQL password (shared with postgres-credentials)
  POSTGRES_PASSWORD: "CHANGEME_BASE64"
  # Database URL including pgbouncer connection
  ASIBOT_DATABASE_URL: "CHANGEME_BASE64"  # base64 of: postgresql://asibot:<password>@pgbouncer:6432/asibot
  # Microsoft 365 SSO (optional)
  ASIBOT_MS365_TENANT_ID: ""
  ASIBOT_MS365_CLIENT_ID: ""
  # GitHub OAuth (optional)
  ASIBOT_GITHUB_CLIENT_ID: ""
  # Google OAuth (optional)
  ASIBOT_GOOGLE_CLIENT_ID: ""
  ASIBOT_GOOGLE_CLIENT_SECRET: ""
  # Metrics auth (optional)
  ASIBOT_METRICS_BEARER_TOKEN: ""
  # KMS / Vault (optional)
  ASIBOT_KMS_KEY_ID: ""
  ASIBOT_VAULT_ADDR: ""
  ASIBOT_VAULT_TOKEN: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: asibot
  labels:
    app.kubernetes.io/name: asibot
    app.kubernetes.io/component: postgres
type: Opaque
data:
  POSTGRES_PASSWORD: "CHANGEME_BASE64"
---
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-userlist
  namespace: asibot
  labels:
    app.kubernetes.io/name: asibot
    app.kubernetes.io/component: pgbouncer
type: Opaque
stringData:
  userlist.txt: |
    "asibot" "CHANGEME_PLAINTEXT_PASSWORD"
