[databases]
asibot = host=postgres port=5432 dbname=asibot

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — best for asyncpg (no session-level state)
pool_mode = transaction

; Connection limits
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5

; Timeouts
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Admin
admin_users = asibot
stats_users = asibot
