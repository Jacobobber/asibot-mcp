groups:
  - name: postgres.rules
    rules:
      - alert: PostgreSQL_ReplicationLag
        expr: pg_stat_replication_pg_wal_lsn_diff > 10485760
        for: 5m
        labels:
          severity: SEV2
        annotations:
          summary: "PostgreSQL replication lag exceeds 10MB"
          description: "Replication lag is {{ $value | humanize1024 }}B on {{ $labels.instance }}"

      - alert: PostgreSQL_ConnectionSaturation
        expr: (sum(pg_stat_activity_count) / pg_settings_max_connections) > 0.8
        for: 5m
        labels:
          severity: SEV2
        annotations:
          summary: "PostgreSQL connections above 80% capacity"

      - alert: PostgreSQL_ReplicaDown
        expr: pg_up{job="postgres-replica"} == 0
        for: 1m
        labels:
          severity: SEV1
        annotations:
          summary: "PostgreSQL read replica is down"
