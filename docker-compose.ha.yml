# PostgreSQL HA override for local testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.ha.yml up
services:
  postgres:
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=1GB
      -c hot_standby=on
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./deploy/postgres-init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro

  postgres-replica:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    volumes:
      - pg-replica-data:/var/lib/postgresql/data
    command: >
      bash -c "
        if [ ! -s /var/lib/postgresql/data/pgdata/PG_VERSION ]; then
          until pg_isready -h postgres -U asibot; do sleep 2; done;
          PGPASSWORD=$${POSTGRES_PASSWORD:-devpass} pg_basebackup -h postgres -U replicator -D /var/lib/postgresql/data/pgdata -Fp -Xs -P -R;
        fi;
        exec postgres -c hot_standby=on -c hot_standby_feedback=on
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asibot"]
      interval: 10s
      timeout: 5s
      retries: 5

  asibot:
    environment:
      - ASIBOT_DATABASE_READ_URL=postgresql://asibot:${POSTGRES_PASSWORD:-devpass}@postgres-replica:5432/asibot

volumes:
  pg-replica-data:
