services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  asibot:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - asibot-data:/data
    env_file: .env
    environment:
      - ASIBOT_TRANSPORT=streamable-http
      - ASIBOT_SESSION_BACKEND=redis
      - ASIBOT_REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  asibot-data:
