services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_PATH:-./deploy/certs/cert.pem}:/etc/nginx/certs/cert.pem:ro
      - ${TLS_KEY_PATH:-./deploy/certs/key.pem}:/etc/nginx/certs/key.pem:ro
    depends_on:
      asibot:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO", "/dev/null", "https://localhost:443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  asibot:
    build: .
    # No external ports — only accessible through nginx reverse proxy
    expose:
      - "8080"
      - "8081"
    volumes:
      - asibot-data:/data
    env_file: .env
    environment:
      - ASIBOT_ALLOW_INSECURE_HTTP=true  # TLS terminates at nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  asibot-data:
